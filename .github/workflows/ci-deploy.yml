name: Build and deploy Profile Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Copy files directly to /var/www/rahullore
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "index.html,rahul.jpeg,rahullore_CL.pdf,rahullore_OP.pdf"
        target: "/var/www/rahullore/"

    - name: Fix permissions and reload Caddy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -euo pipefail
          mkdir -p /var/www/rahullore
          # Ensure Caddy can read files
          chown -R caddy:caddy /var/www/rahullore
          chmod -R 755 /var/www/rahullore
          # Reload Caddy to pick up changes
          systemctl reload caddy


    